<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Restaurant Page</title>
		<link rel="stylesheet" href="./styles/navbar.css" />
		<link rel="stylesheet" href="./styles/homepage.css" />
	</head>
	<body>
		<header id="tabs">
			<nav>
				<button id="home-btn">Home</button>
				<button id="menu-btn">Menu</button>
				<button id="about-btn">About</button>
			</nav>
		</header>

		<main id="content">
			<header>
				<img
					src="./assets/images/left-bee.png"
					alt="This is a bee."
					id="left-bee"
				/>
				<h1>Beary's Breakfast Bar</h1>
				<img
					src="./assets/images/right-bee.png"
					alt="This is another bee."
					id="right-bee"
				/>
			</header>
			<section id="cards-container">
				<section id="beehive-container">
					<img
						src="./assets/images/beehive.png"
						alt="This is a beehive."
						id="beehive"
					/>
				</section>
				<section id="short-description">
					<p>
						Beary's has the best porridge! The atmosphere and
						customer service make you feel like you are sitting in
						the middle of the woods, eating like a bear! This is
						exactly the kind of place that I like to return to again
						and again.
					</p>
					<p>Goldilocks</p>
				</section>
			</section>
		</main>
	</body>
</html>
