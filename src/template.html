<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Restaurant Page</title>
		<link rel="stylesheet" href="./styles/navbar.css" />
		<link rel="stylesheet" href="./styles/home-page.css" />
		<link rel="stylesheet" href="./styles/menu.css" />
	</head>
	<body>
		<header id="tabs">
			<nav>
				<button id="home-btn">Home</button>
				<button id="menu-btn">Menu</button>
				<button id="contact-btn">Contact</button>
			</nav>
		</header>

		<main id="content">
			<section id="menu-title">
				<img
					src="./assets/images/left-bee.png"
					alt="This is a bee."
					id="left-bee"
				/>
				<h1>Menu</h1>
				<img
					src="./assets/images/right-bee.png"
					alt="This is another bee."
					id="right-bee"
				/>
			</section>
			<section id="menu-container">
				<section id="beverages">
					<h2>Beverages</h2>
					<section id="honey-tea">
						<h3>Honey Tea</h3>
						<p>$2</p>
					</section>
					<section id="berry-tea">
						<h3>Berry Tea</h3>
						<p>$3</p>
					</section>
				</section>
				<section id="appetizers">
					<h2>Appetizers</h2>
					<section id="toast">
						<h3>Toast and Jam</h3>
						<p>$1</p>
					</section>
					<section id="fruit">
						<h3>Fresh Fruit</h3>
						<p>$3</p>
					</section>
				</section>
			</section>
		</main>
	</body>
</html>
